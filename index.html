<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuroNexus Python Packages</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f0f2f5;
        color: #1a1a1a;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 5rem 1.5rem;
      }

      header {
        text-align: center;
        margin-bottom: 3.5rem;
      }

      header img {
        height: 48px;
        mix-blend-mode: multiply;
      }

      header p {
        margin-top: 0.6rem;
        color: #555;
        font-size: 0.875rem;
      }

      main {
        width: 100%;
        max-width: 460px;
        display: flex;
        flex-direction: column;
        gap: 2.5rem;
      }

      section h2 {
        font-size: 0.7rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #888;
        margin-bottom: 0.6rem;
      }

      ul {
        list-style: none;
        display: flex;
        flex-direction: column;
        border: 1px solid #dde1e7;
        border-radius: 8px;
        overflow: hidden;
        background: #fff;
      }

      li + li {
        border-top: 1px solid #dde1e7;
      }

      li a {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.8rem 1rem;
        text-decoration: none;
        color: #1a1a1a;
        font-size: 0.875rem;
        transition: background 0.1s;
      }

      li a:hover {
        background: #f7f8fa;
      }

      li a::after {
        content: "↗";
        color: #aaa;
        font-size: 0.8rem;
      }

      li a:hover::after {
        color: #555;
      }

      li a.deprecated-link {
        color: #999;
      }

      li a.deprecated-link::after {
        content: none;
      }

      .badge {
        font-size: 0.65rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 0.2em 0.55em;
        border-radius: 4px;
        background: #fdf3e3;
        color: #c97c1a;
        border: 1px solid #f0d9b0;
      }
    </style>
  </head>
  <body>
    <header>
      <img src="assets/logo.png" alt="NeuroNexus" />
      <p>Python packages documentation</p>
    </header>

    <main>
      <section>
        <h2>Active</h2>
        <ul>
          <li><a href="/radiens-core-python/latest/">radiens-core</a></li>
          <li><a href="/radiens-drive-catalog/latest/">radiens-drive-catalog</a></li>
        </ul>
      </section>

      <section>
        <h2>Deprecated</h2>
        <ul>
          <li>
            <a href="/radienspy-core-client/" class="deprecated-link">
              radiens
              <span class="badge">Deprecated</span>
            </a>
          </li>
        </ul>
      </section>
    </main>
  </body>
</html>
